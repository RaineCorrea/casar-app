<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a2f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d5a47;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Fundo com gradiente Forest -->
  <rect width="100" height="100" fill="url(#bgGradient)" rx="20" ry="20"/>

  <!-- MN estilizado (desenhado manualmente) -->
  <text x="50" y="70"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="52"
        font-weight="bold"
        text-anchor="middle"
        fill="#faf8f3"
        style="letter-spacing: -2px;">
    MN
  </text>

  <!-- Pequeno coração acima -->
  <path d="M 50 38
           C 50 38, 54 34, 50 30
           C 46 34, 50 38, 50 38 Z"
        fill="#b5623a"
        opacity="0.9"/>
</svg>
